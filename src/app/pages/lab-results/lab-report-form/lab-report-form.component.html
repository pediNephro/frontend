<div class="p-6">
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
      {{ isEditMode ? '✏️ Modifier le rapport' : '➕ Nouveau rapport biologique' }}
    </h1>
    <a routerLink="/lab-reports" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">
      ← Retour
    </a>
  </div>

  <div *ngIf="loading && isEditMode" class="text-center py-8 text-blue-600 animate-pulse">⏳ Chargement...</div>

  <div *ngIf="!loading || !isEditMode" class="bg-white dark:bg-gray-800 rounded-xl shadow p-6 border border-gray-100 dark:border-gray-700">

    <div *ngIf="isEditMode" class="mb-4 bg-yellow-50 border border-yellow-300 text-yellow-800 px-4 py-2 rounded-lg text-sm">
      ⚠️ Modification du rapport <strong>#{{ id }}</strong>
    </div>

    <div *ngIf="error" class="mb-4 bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded-lg">
      ❌ {{ error }}
    </div>

    <form (ngSubmit)="save()" class="space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Patient ID *</label>
          <input type="number" [(ngModel)]="form.patientId" name="patientId" required
                 class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white text-sm focus:ring-2 focus:ring-blue-400"/>
        </div>

        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Date du rapport *</label>
          <input type="date" [(ngModel)]="form.reportDate" name="reportDate" required
                 class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white text-sm focus:ring-2 focus:ring-blue-400"/>
        </div>

        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Type d'analyse</label>
          <input type="text" [(ngModel)]="form.analysisType" name="analysisType"
                 placeholder="Ex: NFS, Ionogramme..."
                 class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white text-sm focus:ring-2 focus:ring-blue-400"/>
        </div>

        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Nom du laboratoire</label>
          <input type="text" [(ngModel)]="form.laboratoryName" name="laboratoryName"
                 placeholder="Ex: Laboratoire Central..."
                 class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white text-sm focus:ring-2 focus:ring-blue-400"/>
        </div>

        <div class="md:col-span-2">
          <label class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Commentaire</label>
          <textarea [(ngModel)]="form.comment" name="comment" rows="3"
                    placeholder="Observations, remarques..."
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white text-sm focus:ring-2 focus:ring-blue-400"></textarea>
        </div>
      </div>

      <div class="flex gap-3 pt-4 border-t border-gray-100 dark:border-gray-700">
        <button type="submit" [disabled]="loading"
                class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium text-sm disabled:opacity-50">
          {{ isEditMode ? '💾 Mettre à jour' : '✅ Enregistrer' }}
        </button>
        <a routerLink="/lab-reports"
           class="px-6 py-2 border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 text-sm">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
