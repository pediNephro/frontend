<div class="max-w-4xl mx-auto p-6 bg-white rounded-xl shadow">
  <h2 class="text-xl font-semibold mb-6 text-gray-800 dark:text-white">
    Create Facture
  </h2>

  <form [formGroup]="factureForm" (ngSubmit)="onSubmit()" class="space-y-6">

    <div>
      <label class="block mb-2 text-gray-700 dark:text-gray-300">Patient</label>
      <select formControlName="idPatient" class="w-full border rounded p-3">
        <option value="">Select patient</option>
        <option *ngFor="let patient of patients" [value]="patient.id">
          {{ patient.firstName }} {{ patient.lastName }}
        </option>
      </select>
    </div>

    <div>
      <label class="block mb-3 text-gray-700 dark:text-gray-300">
        Select one or more acts
      </label>

      <div class="border rounded-xl p-4 max-h-72 overflow-y-auto space-y-3">
        <div
          *ngFor="let action of actions"
          class="flex items-center justify-between border rounded-lg px-4 py-3"
        >
          <label class="flex items-center gap-3 cursor-pointer w-full">
            <input
              type="checkbox"
              [checked]="isChecked(action.id)"
              (change)="onActionToggle(action.id, $event)"
            />
            <div>
              <div class="font-medium text-gray-800">
                {{ action.nomAct }}
              </div>
              <div class="text-sm text-gray-500">
                {{ action.categoryAct }}
              </div>
            </div>
          </label>

          <div class="text-sm font-semibold text-blue-600">
            {{ action.prixAct | number:'1.2-2' }} TND
          </div>
        </div>
      </div>

      <small
        class="text-red-500"
        *ngIf="factureForm.get('actionIds')?.touched && factureForm.get('actionIds')?.invalid"
      >
        Select at least one act.
      </small>
    </div>

    <div class="bg-gray-50 rounded-xl p-4 border">
      <h3 class="font-semibold mb-3 text-gray-800">Selected Acts</h3>

      <div *ngIf="selectedActions.length === 0" class="text-gray-500 text-sm">
        No act selected.
      </div>

      <ul *ngIf="selectedActions.length > 0" class="space-y-2">
        <li *ngFor="let action of selectedActions" class="flex justify-between text-sm">
          <span>{{ action.nomAct }}</span>
          <span class="font-medium">{{ action.prixAct | number:'1.2-2' }} TND</span>
        </li>
      </ul>

      <div class="mt-4 pt-3 border-t flex justify-between font-semibold text-gray-800">
        <span>Total preview</span>
        <span>{{ totalPreview | number:'1.2-2' }} TND</span>
      </div>
    </div>

    <div class="flex gap-3">
      <button
        type="submit"
        class="bg-brand-500 hover:bg-brand-600 text-white px-5 py-3 rounded-xl shadow"
      >
        Create Facture
      </button>
      <a
        routerLink="/factures"
        class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-5 py-3 rounded-xl shadow"
      >
        Cancel
      </a>
    </div>
  </form>
</div>
