<div class="p-8 ml-[290px] transition-all">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">
      Factures
    </h2>

    <a
      routerLink="/factures/create"
      class="bg-brand-500 hover:bg-brand-600 text-white px-5 py-3 rounded-xl shadow"
    >
      + New Facture
    </a>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-2xl shadow overflow-hidden">
    <table class="w-full text-sm text-left">
      <thead class="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 uppercase text-xs">
        <tr>
          <th class="px-6 py-4">Patient</th>
          <th class="px-6 py-4">Act</th>
          <th class="px-6 py-4">Prix Total</th>
          <th class="px-6 py-4">Date</th>
          <th class="px-6 py-4 text-right">Actions</th>
        </tr>
      </thead>

      <tbody class="divide-y dark:divide-gray-700">
        <tr *ngFor="let facture of factures" class="hover:bg-gray-50 dark:hover:bg-gray-800 transition">
          <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">
            {{ facture.patient.firstName }} {{ facture.patient.lastName }}
          </td>

          <td class="px-6 py-4 text-gray-700 dark:text-gray-300">
            {{ facture.nomAct }}
          </td>

          <td class="px-6 py-4 text-gray-700 dark:text-gray-300">
            {{ facture.prixTotal | number:'1.2-2' }}
          </td>

          <td class="px-6 py-4 text-gray-700 dark:text-gray-300">
            {{ facture.dateCreation | date:'medium' }}
          </td>

          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-4">
              <button
                (click)="viewPdf(facture.id)"
                class="text-blue-600 hover:underline"
              >
                Voir PDF
              </button>

              <button
                (click)="downloadPdf(facture.id)"
                class="text-green-600 hover:underline"
              >
                Télécharger
              </button>

              <button
                (click)="delete(facture.id)"
                class="text-red-600 hover:underline"
              >
                Delete
              </button>
            </div>
          </td>
        </tr>

        <tr *ngIf="factures.length === 0">
          <td colspan="5" class="px-6 py-6 text-center text-gray-500 dark:text-gray-400">
            No factures found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- PDF Modal -->
<div
  *ngIf="pdfModalOpen"
  class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 p-6"
>
  <div class="bg-white w-[95%] h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
    <div class="flex items-center justify-between px-6 py-4 border-b">
      <h3 class="text-lg font-semibold text-gray-800">
        Aperçu de la facture PDF
      </h3>

      <div class="flex items-center gap-3">
        <button
          *ngIf="selectedFactureId"
          (click)="downloadPdf(selectedFactureId)"
          class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg"
        >
          Télécharger
        </button>

        <button
          (click)="closePdfModal()"
          class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg"
        >
          Fermer
        </button>
      </div>
    </div>

    <div class="flex-1 bg-gray-100">
      <iframe
        *ngIf="pdfUrl"
        [src]="pdfUrl"
        class="w-full h-full border-0"
      ></iframe>
    </div>
  </div>
</div>
