<app-page-breadcrumb pageTitle="Mon Profil" />

<div class="mx-auto max-w-[800px] space-y-6">
    <app-component-card title="Détails du Profil" desc="Consultez et modifiez vos informations personnelles">

        <!-- Success/Error Messages -->
        @if (successMessage) {
        <div
            class="mb-4 rounded-lg bg-success-50 p-4 text-sm text-success-700 dark:bg-success-500/15 dark:text-success-500">
            {{ successMessage }}
        </div>
        }
        @if (errorMessage) {
        <div class="mb-4 rounded-lg bg-error-50 p-4 text-sm text-error-700 dark:bg-error-500/15 dark:text-error-500">
            {{ errorMessage }}
        </div>
        }

        <div class="flex flex-col items-center gap-6 mb-8 sm:flex-row">
            <div class="relative overflow-hidden rounded-full h-32 w-32 border-4 border-gray-100 dark:border-gray-800">
                <img [src]="user.profileImageUrl || '/images/user/owner.png'" alt="User Profile" class="h-full w-full object-cover" />
            </div>
            <div>
                <h2 class="text-xl font-bold text-gray-800 dark:text-white">{{ user.firstName }} {{ user.lastName }}
                </h2>
                <p class="text-gray-500 dark:text-gray-400">{{ user.roleName }}</p>
                <span
                    class="mt-2 inline-flex items-center rounded-full bg-success-50 px-2.5 py-0.5 text-xs font-medium text-success-700 dark:bg-success-500/15 dark:text-success-500">
                    {{ user.status }}
                </span>
            </div>
        </div>

        <form (ngSubmit)="onUpdateProfile()" class="space-y-5">
            <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
                <!-- Prénom -->
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">first Name</label>
                    <input type="text" [(ngModel)]="user.firstName" name="firstName" required
                        class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs focus:border-brand-300 focus:outline-none focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:focus:border-brand-800"
                        placeholder="Votre prénom" />
                </div>
                <!-- Nom -->
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">last Name</label>
                    <input type="text" [(ngModel)]="user.lastName" name="lastName" required
                        class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs focus:border-brand-300 focus:outline-none focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:focus:border-brand-800"
                        placeholder="Votre nom" />
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
                <input type="email" [(ngModel)]="user.email" name="email" required
                    class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs focus:border-brand-300 focus:outline-none focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:focus:border-brand-800"
                    placeholder="votre.email@exemple.com" />
            </div>

            <!-- Role (Read-only for profile edit) -->
            <div>
                <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">Role (disable)</label>
                <input type="text" [value]="user.roleName" disabled
                    class="h-11 w-full cursor-not-allowed rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-gray-500 dark:border-gray-800 dark:bg-white/5 dark:text-gray-400" />
            </div>

            <div class="flex items-center justify-end pt-4">
                <button type="submit" [disabled]="isLoading"
                    class="flex items-center justify-center rounded-lg bg-brand-500 px-8 py-3 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500/20 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                    {{ isLoading ? 'update...' : 'Save modification' }}
                </button>
            </div>
        </form>
    </app-component-card>
</div>
